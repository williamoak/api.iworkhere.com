name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - testing

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        # Ensure the repository typechecks before running other steps.
        run: npm run build --silent

      - name: Generate Swagger (verify)
        # Run the project's swagger generator; if this step fails the job will
        # fail. We then check that the generated swagger.json is committed.
        run: npm run swagger:gen --silent

      - name: Ensure swagger.json is up-to-date
        run: git diff --exit-code swagger.json

      - name: Audit dependencies (critical)
        # Fail the job on CRITICAL vulnerabilities; adjust level if desired.
        run: npm audit --audit-level=critical

      - name: Run test suite
        run: npm test